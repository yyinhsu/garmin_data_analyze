[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort, UP = pyupgrade, B = bugbear
select = ["E", "W", "F", "I", "UP", "B"]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # function call in default arg
    "UP007",  # X | Y union syntax (keep Optional for readability)
]
# Data-science notebooks often use star imports from numpy/pandas
per-file-ignores = { "*.ipynb" = ["F401", "F811", "E402"] }

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
